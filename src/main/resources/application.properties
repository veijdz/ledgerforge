spring.application.name=ledgerforge

# Virtual-thread-per-request (Loom). Blocking imperative code scales without reactive.
spring.threads.virtual.enabled=true

# Actuator (minimal). Only health is exposed over HTTP for now; Prometheus/OTel/metrics
# wiring is deferred to Fase 6.5. Liveness/readiness probe groups are enabled so the
# container orchestration (and the compose healthcheck) can hit /actuator/health.
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
